<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPS-MIS Point of Sale System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        .header h1 { color: #333; margin-bottom: 10px; }
        .date-time { color: #667eea; margin-top: 10px; font-family: monospace; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .panel {
            background: white;
            border-radius: 10px;
            padding: 20px;
        }
        .panel h2 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group select, .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .quantity-control {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .quantity-control button {
            width: 40px;
            height: 40px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 16px;
        }
        .btn-danger { background: #6c757d; }
        .btn-success { background: #28a745; }
        .btn-warning { background: #ffc107; color: #333; }
        .total {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin: 20px 0;
            color: white;
        }
        .total .amount { font-size: 28px; font-weight: bold; }
        .cart-item {
            background: #f8f9fa;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .remove-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
        }
        .report-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 14px;
        }
        .report-table th, .report-table td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        .report-table th { background: #f8f9fa; }
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 5px;
            color: white;
            z-index: 1000;
            animation: slideIn 0.3s;
        }
        .success { background: #28a745; }
        .error { background: #dc3545; }
        .info { background: #17a2b8; }
        .stats {
            background: #e8f5e9;
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
        }
        .progress-bar {
            width: 100%;
            background: #f0f0f0;
            border-radius: 5px;
            margin: 10px 0;
            overflow: hidden;
        }
        .progress-fill {
            background: #28a745;
            color: white;
            text-align: center;
            padding: 5px;
            transition: width 0.3s;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏪 TPS-MIS Point of Sale System</h1>
            <p>TechRetail Solutions - Transaction Processing & Management Information System</p>
            <div class="date-time" id="datetime"></div>
        </div>

        <div class="grid">
            <!-- POS Panel -->
            <div class="panel">
                <h2>🛒 New Transaction</h2>
                <div class="form-group">
                    <label>👤 Staff Member</label>
                    <select id="staffSelect">
                        <option value="">Select Staff</option>
                        <option value="STF001">Steve Jobs</option>
                        <option value="STF002">Prakash Prasad</option>
                        <option value="STF003">Sienna Prasad</option>
                        <option value="STF004">Caydan Prasad</option>
                        <option value="STF005">Shakiera Samsundar</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>📦 Product</label>
                    <select id="productSelect">
                        <option value="">Select Product</option>
                        <option value="PRD001">Laptop Pro 15" - $1299.99</option>
                        <option value="PRD002">Wireless Mouse - $29.99</option>
                        <option value="PRD003">Mechanical Keyboard - $89.99</option>
                        <option value="PRD004">27" Monitor - $349.99</option>
                        <option value="PRD005">Office Chair - $199.99</option>
                        <option value="PRD006">Standing Desk - $399.99</option>
                        <option value="PRD007">Coffee Maker - $79.99</option>
                        <option value="PRD008">Bluetooth Speaker - $59.99</option>
                        <option value="PRD009">USB-C Hub - $39.99</option>
                        <option value="PRD010">External SSD - $149.99</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>💰 Price</label>
                    <input type="text" id="price" readonly>
                </div>
                <div class="form-group">
                    <label>🔢 Quantity</label>
                    <div class="quantity-control">
                        <button onclick="changeQty(-1)">-</button>
                        <input type="number" id="quantity" value="1" min="1">
                        <button onclick="changeQty(1)">+</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>💳 Payment</label>
                    <select id="payment">
                        <option>Cash</option>
                        <option>Credit Card</option>
                        <option>Debit Card</option>
                        <option>Mobile Payment</option>
                    </select>
                </div>
                <button class="btn" onclick="addToCart()">➕ Add to Cart</button>
            </div>

            <!-- Cart Panel -->
            <div class="panel">
                <h2>🛍️ Shopping Cart</h2>
                <div id="cartList"><p style="text-align:center; color:#999;">Cart is empty</p></div>
                <div class="total">
                    <div>Total Amount</div>
                    <div class="amount" id="cartTotal">$0.00</div>
                </div>
                <button class="btn" onclick="completeSale()">✅ Complete Sale</button>
                <button class="btn btn-danger" onclick="clearCart()">🗑️ Clear Cart</button>
            </div>
        </div>

        <!-- Reports Panel -->
        <div class="panel" style="margin-top: 20px;">
            <h2>📊 MIS Reports</h2>
            <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
                <input type="date" id="reportDate" style="flex: 1; padding: 10px;">
                <button class="btn" style="width: auto; padding: 10px 20px;" onclick="showReport()">Generate Report</button>
                <button class="btn btn-success" style="width: auto; padding: 10px 20px;" onclick="generate1000Samples()">Generate 1000 Samples</button>
                <button class="btn btn-warning" style="width: auto; padding: 10px 20px;" onclick="syncToGoogleSheets()">Sync to Google Sheets</button>
                <button class="btn btn-danger" style="width: auto; padding: 10px 20px; background:#dc3545;" onclick="clearAllData()">Clear All Data</button>
            </div>
            <div id="progress" style="display: none;">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill">0%</div>
                </div>
            </div>
            <div id="report"></div>
            <div id="stats" class="stats"></div>
        </div>
    </div>

    <script>
        // ============ CONFIGURATION ============
        // !!! REPLACE THIS WITH YOUR GOOGLE APPS SCRIPT URL !!!
        const GOOGLE_SHEETS_API = 'https://script.google.com/macros/s/AKfycbxgkYgL1iMtzKcYfrFsdXNlpZVVtyR8ka-HPGlmgYU-4lJg6PIMC-VDlecu0NmjBfM/exec';
        
        // ============ DATA ============
        const products = {
            'PRD001': { name: 'Laptop Pro 15"', price: 1299.99 },
            'PRD002': { name: 'Wireless Mouse', price: 29.99 },
            'PRD003': { name: 'Mechanical Keyboard', price: 89.99 },
            'PRD004': { name: '27" Monitor', price: 349.99 },
            'PRD005': { name: 'Office Chair', price: 199.99 },
            'PRD006': { name: 'Standing Desk', price: 399.99 },
            'PRD007': { name: 'Coffee Maker', price: 79.99 },
            'PRD008': { name: 'Bluetooth Speaker', price: 59.99 },
            'PRD009': { name: 'USB-C Hub', price: 39.99 },
            'PRD010': { name: 'External SSD', price: 149.99 }
        };
        
        const staffNames = {
            'STF001': 'Steve Jobs',
            'STF002': 'Prakash Prasad',
            'STF003': 'Sienna Prasad',
            'STF004': 'Caydan Prasad',
            'STF005': 'Shakiera Samsundar'
        };
        
        let cart = [];
        let transactions = [];
        let googleSheetsStatus = { synced: false, lastSync: null };
        
        // ============ LOAD/SAVE DATA ============
        function loadData() {
            let saved = localStorage.getItem('tps_transactions');
            if (saved) {
                transactions = JSON.parse(saved);
                console.log(`Loaded ${transactions.length} transactions from local storage`);
            }
            
            let savedStatus = localStorage.getItem('google_sheets_status');
            if (savedStatus) {
                googleSheetsStatus = JSON.parse(savedStatus);
            }
            
            updateStats();
            showReport();
        }
        
        function saveData() {
            localStorage.setItem('tps_transactions', JSON.stringify(transactions));
            localStorage.setItem('google_sheets_status', JSON.stringify(googleSheetsStatus));
            updateStats();
        }
        
        function updateStats() {
            let totalRevenue = transactions.reduce((sum, t) => sum + t.total, 0);
            let totalItems = transactions.reduce((sum, t) => sum + t.qty, 0);
            let syncStatus = googleSheetsStatus.synced ? '✅ Synced to Google Sheets' : '⚠️ Not synced to Google Sheets';
            let lastSync = googleSheetsStatus.lastSync ? ` | Last sync: ${new Date(googleSheetsStatus.lastSync).toLocaleString()}` : '';
            
            document.getElementById('stats').innerHTML = `
                <strong>📊 Database Status:</strong><br>
                Local Transactions: ${transactions.length} | Items Sold: ${totalItems} | Revenue: $${totalRevenue.toFixed(2)}<br>
                ${syncStatus}${lastSync}
            `;
        }
        
        // ============ GOOGLE SHEETS SYNC ============
        async function syncToGoogleSheets() {
            if (transactions.length === 0) {
                showMessage('No transactions to sync. Generate samples first!', 'error');
                return;
            }
            
            if (googleSheetsStatus.synced && transactions.length === googleSheetsStatus.syncedCount) {
                showMessage('All transactions already synced to Google Sheets!', 'info');
                return;
            }
            
            showMessage(`Syncing ${transactions.length} transactions to Google Sheets...`, 'info');
            
            // Show progress bar
            const progressDiv = document.getElementById('progress');
            const progressFill = document.getElementById('progressFill');
            progressDiv.style.display = 'block';
            
            // Prepare data for Google Sheets
            const dataToSync = transactions.map(t => ({
                transactionID: t.id,
                timestamp: t.timestamp,
                staffID: t.staffId,
                staffName: t.staffName,
                itemCode: t.productCode,
                itemName: t.productName,
                quantity: t.qty,
                unitPrice: t.price,
                totalPrice: t.total,
                paymentMethod: t.payment
            }));
            
            // Send in batches of 100 to avoid timeout
            const batchSize = 100;
            let successCount = 0;
            
            for (let i = 0; i < dataToSync.length; i += batchSize) {
                const batch = dataToSync.slice(i, i + batchSize);
                const percent = Math.round((i / dataToSync.length) * 100);
                progressFill.style.width = percent + '%';
                progressFill.textContent = percent + '%';
                
                try {
                    const response = await fetch(GOOGLE_SHEETS_API, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            action: 'saveBatch', 
                            data: batch 
                        })
                    });
                    successCount += batch.length;
                    console.log(`Synced batch ${i/batchSize + 1}: ${batch.length} transactions`);
                } catch (error) {
                    console.error('Sync error:', error);
                    showMessage(`Error syncing batch: ${error.message}`, 'error');
                }
            }
            
            progressFill.style.width = '100%';
            progressFill.textContent = '100%';
            
            setTimeout(() => {
                progressDiv.style.display = 'none';
            }, 2000);
            
            // Update sync status
            googleSheetsStatus = {
                synced: true,
                syncedCount: transactions.length,
                lastSync: new Date().toISOString()
            };
            saveData();
            
            showMessage(`✅ Successfully synced ${successCount} transactions to Google Sheets! Check your Google Sheet.`, 'success');
        }
        
        // ============ UI FUNCTIONS ============
        function updateDateTime() {
            document.getElementById('datetime').innerHTML = new Date().toLocaleString();
        }
        setInterval(updateDateTime, 1000);
        updateDateTime();
        
        document.getElementById('productSelect').onchange = function() {
            let code = this.value;
            if (code && products[code]) {
                document.getElementById('price').value = '$' + products[code].price;
            } else {
                document.getElementById('price').value = '';
            }
        };
        
        function changeQty(delta) {
            let qty = document.getElementById('quantity');
            let val = parseInt(qty.value) + delta;
            if (val >= 1) qty.value = val;
        }
        
        function addToCart() {
            let staffId = document.getElementById('staffSelect').value;
            let productCode = document.getElementById('productSelect').value;
            let qty = parseInt(document.getElementById('quantity').value);
            
            if (!staffId) { showMessage('Select staff member', 'error'); return; }
            if (!productCode) { showMessage('Select product', 'error'); return; }
            
            let product = products[productCode];
            
            cart.push({
                id: Date.now(),
                staffId: staffId,
                staffName: staffNames[staffId],
                productCode: productCode,
                productName: product.name,
                qty: qty,
                price: product.price,
                total: qty * product.price
            });
            
            updateCart();
            showMessage(product.name + ' added to cart', 'success');
            document.getElementById('quantity').value = 1;
        }
        
        function updateCart() {
            let cartDiv = document.getElementById('cartList');
            if (cart.length == 0) {
                cartDiv.innerHTML = '<p style="text-align:center; color:#999;">Cart is empty</p>';
                document.getElementById('cartTotal').innerHTML = '$0.00';
                return;
            }
            
            let html = '';
            let total = 0;
            cart.forEach(item => {
                total += item.total;
                html += `
                    <div class="cart-item">
                        <div>
                            <strong>${item.productName}</strong><br>
                            Qty: ${item.qty} x $${item.price.toFixed(2)}
                        </div>
                        <div>
                            $${item.total.toFixed(2)}
                            <button class="remove-btn" onclick="removeFromCart(${item.id})">X</button>
                        </div>
                    </div>
                `;
            });
            
            cartDiv.innerHTML = html;
            document.getElementById('cartTotal').innerHTML = '$' + total.toFixed(2);
        }
        
        function removeFromCart(id) {
            cart = cart.filter(item => item.id != id);
            updateCart();
        }
        
        function clearCart() {
            cart = [];
            updateCart();
            showMessage('Cart cleared', 'success');
        }
        
        function completeSale() {
            if (cart.length == 0) {
                showMessage('Cart is empty', 'error');
                return;
            }
            
            let payment = document.getElementById('payment').value;
            let timestamp = new Date().toISOString();
            
            cart.forEach(item => {
                transactions.push({
                    id: 'TXN' + Date.now() + Math.random(),
                    timestamp: timestamp,
                    staffId: item.staffId,
                    staffName: item.staffName,
                    productCode: item.productCode,
                    productName: item.productName,
                    qty: item.qty,
                    price: item.price,
                    total: item.total,
                    payment: payment
                });
            });
            
            saveData();
            let total = cart.reduce((sum, i) => sum + i.total, 0);
            clearCart();
            showReport();
            showMessage(`Sale complete! Total: $${total.toFixed(2)}`, 'success');
        }
        
        // ============ REPORT FUNCTIONS ============
        function showReport() {
            let date = document.getElementById('reportDate').value;
            let filtered = [...transactions];
            
            if (date) {
                filtered = filtered.filter(t => t.timestamp.startsWith(date));
            }
            
            if (filtered.length == 0) {
                document.getElementById('report').innerHTML = '<p style="text-align:center;">No transactions found. Click "Generate 1000 Samples" to create data.</p>';
                return;
            }
            
            // Product Performance
            let productStats = {};
            filtered.forEach(t => {
                if (!productStats[t.productName]) {
                    productStats[t.productName] = { qty: 0, revenue: 0 };
                }
                productStats[t.productName].qty += t.qty;
                productStats[t.productName].revenue += t.total;
            });
            
            // Staff Performance
            let staffStats = {};
            filtered.forEach(t => {
                if (!staffStats[t.staffName]) {
                    staffStats[t.staffName] = { count: 0, revenue: 0, items: 0 };
                }
                staffStats[t.staffName].count++;
                staffStats[t.staffName].revenue += t.total;
                staffStats[t.staffName].items += t.qty;
            });
            
            let totalRevenue = filtered.reduce((sum, t) => sum + t.total, 0);
            let totalItems = filtered.reduce((sum, t) => sum + t.qty, 0);
            
            let html = `
                <h3>📈 Product Performance Report</h3>
                <table class="report-table">
                    <thead><tr><th>Product</th><th>Quantity Sold</th><th>Revenue</th></tr></thead>
                    <tbody>
                        ${Object.entries(productStats).sort((a,b) => b[1].revenue - a[1].revenue).map(([name, data]) => `
                            <tr><td>${name}</td><td>${data.qty}</td><td>$${data.revenue.toFixed(2)}</td></tr>
                        `).join('')}
                    </tbody>
                </table>
                
                <h3 style="margin-top:20px;">👥 Staff Performance Report</h3>
                <table class="report-table">
                    <thead><tr><th>Staff Member</th><th>Transactions</th><th>Items Sold</th><th>Revenue</th></tr></thead>
                    <tbody>
                        ${Object.entries(staffStats).sort((a,b) => b[1].revenue - a[1].revenue).map(([name, data]) => `
                            <tr><td>${name}</td><td>${data.count}</td><td>${data.items}</td><td>$${data.revenue.toFixed(2)}</td></tr>
                        `).join('')}
                    </tbody>
                </table>
                
                <div style="margin-top:20px; padding:15px; background:#e8f5e9; border-radius:5px;">
                    <strong>📊 Summary (${date || 'All Time'}):</strong><br>
                    Total Transactions: ${filtered.length}<br>
                    Total Items Sold: ${totalItems}<br>
                    Total Revenue: $${totalRevenue.toFixed(2)}<br>
                    Average Transaction Value: $${(totalRevenue / filtered.length).toFixed(2)}
                </div>
            `;
            
            document.getElementById('report').innerHTML = html;
        }
        
        // ============ GENERATE 1000 SAMPLES ============
        function generate1000Samples() {
            if (transactions.length >= 1000) {
                if (confirm(`You already have ${transactions.length} transactions. Do you want to clear and generate fresh 1000 samples?`)) {
                    transactions = [];
                } else {
                    return;
                }
            }
            
            showMessage('Generating 1000 sample transactions...', 'info');
            
            let startDate = new Date();
            startDate.setDate(startDate.getDate() - 7);
            startDate.setHours(9, 0, 0, 0);
            
            let productList = Object.keys(products);
            let staffList = Object.keys(staffNames);
            let paymentMethods = ['Cash', 'Credit Card', 'Debit Card', 'Mobile Payment'];
            
            for (let i = 0; i < 1000; i++) {
                let randomDate = new Date(startDate);
                randomDate.setMinutes(randomDate.getMinutes() + Math.random() * 10080);
                
                let staffId = staffList[Math.floor(Math.random() * staffList.length)];
                let productCode = productList[Math.floor(Math.random() * productList.length)];
                let product = products[productCode];
                let qty = Math.floor(Math.random() * 5) + 1;
                
                transactions.push({
                    id: 'TXN' + (Date.now() + i),
                    timestamp: randomDate.toISOString(),
                    staffId: staffId,
                    staffName: staffNames[staffId],
                    productCode: productCode,
                    productName: product.name,
                    qty: qty,
                    price: product.price,
                    total: qty * product.price,
                    payment: paymentMethods[Math.floor(Math.random() * paymentMethods.length)]
                });
            }
            
            saveData();
            googleSheetsStatus.synced = false;
            saveData();
            showReport();
            
            let totalRevenue = transactions.reduce((sum, t) => sum + t.total, 0);
            showMessage(`✅ Generated 1000 sample transactions! Total Revenue: $${totalRevenue.toFixed(2)}`, 'success');
            showMessage(`⚠️ Click "Sync to Google Sheets" to save these to your Google Sheet!`, 'info');
        }
        
        function clearAllData() {
            if (confirm('Are you sure you want to delete ALL transactions? This cannot be undone.')) {
                transactions = [];
                googleSheetsStatus = { synced: false, lastSync: null };
                saveData();
                showReport();
                showMessage('All data cleared', 'success');
            }
        }
        
        function showMessage(msg, type) {
            let div = document.createElement('div');
            div.className = 'message ' + type;
            div.textContent = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }
        
        // ============ INITIALIZE ============
        loadData();
    </script>
</body>
</html>
